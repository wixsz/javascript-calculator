<!DOCTYPE html>
<html>
  <head>
    <title>JavaScript Calculator Tools</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>JavaScript Calculator Tools</h1>
        <p class="intro">Choose a tool and enter your values below.</p>

        <div class="tool-buttons" aria-label="Choose a calculator tool">
          <button class="tool-tab active" id="showTipTool" type="button">
            Tip Calculator
          </button>
          <button class="tool-tab" id="showTempTool" type="button">
            Temperature Converter
          </button>
        </div>

        <section class="tool-section" id="tipTool">
          <h2>Tip Calculator</h2>

          <label for="billAmount">Bill Amount ($)</label>
          <input
            id="billAmount"
            type="number"
            min="0"
            step="0.01"
            placeholder="Example: 45.50"
          />

          <label for="tipPercentage">Tip Percentage (%)</label>
          <input
            id="tipPercentage"
            type="number"
            min="0"
            step="0.1"
            placeholder="Example: 18"
          />

          <button class="calculate-button" id="calculateTip" type="button">
            Calculate Tip
          </button>

          <div class="result-box" id="tipResult" aria-live="polite">
            Enter a bill amount and tip percentage to see the result.
          </div>
        </section>

        <section class="tool-section hidden" id="tempTool">
          <h2>Temperature Converter</h2>

          <label for="temperatureValue">Temperature Value</label>
          <input
            id="temperatureValue"
            type="number"
            step="0.1"
            placeholder="Example: 25"
          />

          <label for="conversionType">Conversion Type</label>
          <select id="conversionType">
            <option value="cToF">Celsius to Fahrenheit</option>
            <option value="fToC">Fahrenheit to Celsius</option>
          </select>

          <button class="calculate-button" id="convertTemp" type="button">
            Convert Temperature
          </button>

          <div class="result-box" id="tempResult" aria-live="polite">
            Enter a temperature to see the converted result.
          </div>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
